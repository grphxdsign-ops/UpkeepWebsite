<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820" role="img" aria-labelledby="title desc">
  <title id="title">Upkeep Document Studio motion storyboard</title>
  <desc id="desc">Static start, mid, and end states for five document studio animations.</desc>
  <defs>
    <style>
      .bg { fill: #030806; }
      .panel { fill: #0d140f; stroke: rgba(255,253,246,.12); }
      .ink { fill: #fffdf6; }
      .muted { fill: rgba(255,253,246,.56); }
      .green { stroke: #9ee86f; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .green-fill { fill: rgba(158,232,111,.2); stroke: #9ee86f; }
      .line { stroke: rgba(255,253,246,.32); fill: none; stroke-linecap: round; }
      text { font-family: Manrope, Arial, sans-serif; }
      .label { font-size: 20px; font-weight: 800; }
      .small { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>
  <rect class="bg" width="1320" height="820"/>
  <text class="ink label" x="46" y="54">Document Studio motion board</text>
  <text class="muted small" x="46" y="82">Start / mid / end states used to build the final SVG animations</text>
  <text class="muted small" x="318" y="132">Start</text>
  <text class="muted small" x="626" y="132">Mid</text>
  <text class="muted small" x="934" y="132">End</text>

